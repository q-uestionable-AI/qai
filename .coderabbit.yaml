# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
early_access: true
tone_instructions: >-
  Concise, direct, security-aware. This is an offensive security platform —
  intentional attack payloads, injection techniques, and malicious server
  construction are the product, not vulnerabilities.

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_in_walkthrough: true
  poem: false
  in_progress_fortune: false
  sequence_diagrams: false
  collapse_walkthrough: true
  changed_files_summary: true
  review_status: true
  commit_status: true
  assess_linked_issues: true
  related_issues: true
  related_prs: false
  suggested_labels: false
  suggested_reviewers: false
  auto_apply_labels: false
  enable_prompt_for_ai_agents: true

  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
    ignore_title_keywords:
      - "WIP"
      - "DO NOT MERGE"

  path_filters:
    - "!**/__pycache__/**"
    - "!**/.mypy_cache/**"
    - "!**/.ruff_cache/**"
    - "!**/.pytest_cache/**"
    - "!**/uv.lock"

  path_instructions:
    - path: "src/q_ai/core/**"
      instructions: >-
        Shared core layer. Verify: API keys only via keyring (never config
        files or env vars in code). Check SQLite queries use parameterized
        statements, never string concatenation. Validate schema migrations
        increment PRAGMA user_version correctly. Ensure models use IntEnum
        for status/severity values. Check config precedence: CLI flag →
        env var → keyring/DB/config file → default.
    - path: "src/q_ai/server/**"
      instructions: >-
        FastAPI web UI. Check: Jinja2 autoescape enabled, no template
        injection vectors. Verify WebSocket message validation in
        websocket.py. Ensure routes bind to 127.0.0.1 only. Check HTMX
        partial responses return correct content types. Flag any blocking
        calls in async route handlers — use asyncio.to_thread() for sync
        operations. Verify error responses don't leak internal paths or
        stack traces.
    - path: "src/q_ai/orchestrator/**"
      instructions: >-
        Workflow orchestration engine. Verify: WorkflowRunner manages
        parent/child run lineage correctly. Check error policies match
        adapter contracts (fail_fast vs best_effort). Ensure WebSocket
        events use the documented schema. Verify wait_for_user gates
        work correctly with resume(). Flag any exception swallowing
        that could hide workflow failures.
    - path: "src/q_ai/audit/**"
      instructions: >-
        MCP server security scanner. The scanner intentionally sends
        malicious payloads to test targets — this is correct behavior,
        not a vulnerability. Focus on: scanner registration, OWASP MCP
        Top 10 category mapping, SARIF output correctness, and proper
        async patterns in scan orchestration. Check that findings map
        to the correct framework categories via FrameworkResolver.
    - path: "src/q_ai/proxy/**"
      instructions: >-
        MCP traffic interceptor. Verify: bidirectional message pipeline
        preserves message ordering. Check transport adapter patterns
        (stdio, SSE, streamable HTTP). Ensure session store captures
        complete message sequences. Flag any data loss in intercept
        hold/release/drop operations.
    - path: "src/q_ai/inject/**"
      instructions: >-
        Tool poisoning and prompt injection testing. This module
        intentionally constructs malicious MCP servers and payloads —
        that is the product. Focus on: campaign executor correctness,
        YAML payload template loading, scoring logic accuracy, and
        proper provider-agnostic patterns via ProviderClient protocol.
        Do NOT flag payload content as security issues.
    - path: "src/q_ai/chain/**"
      instructions: >-
        Multi-step attack chain executor. Chains intentionally compose
        attacks across modules — that is correct. Focus on: YAML
        template validation (cycle detection, reachability), variable
        resolution between steps, dry-run vs live execution paths,
        and blast-radius analysis output correctness.
    - path: "src/q_ai/ipi/**"
      instructions: >-
        Indirect prompt injection. This module intentionally generates
        dangerous documents with hidden instructions — that is the
        product. Focus on: generator correctness across formats (PDF,
        DOCX, HTML, MD, ICS, EML, image), callback listener security
        (the listener itself should be secure even though it receives
        attack callbacks), hit tracking accuracy, and campaign token
        authentication. Do NOT flag payload content as security issues.
    - path: "src/q_ai/cxp/**"
      instructions: >-
        Coding assistant context file poisoning. This module intentionally
        builds poisoned repos — that is the product. Focus on: rule
        catalog loading, builder engine correctness, format template
        handling, and evidence store integrity. Do NOT flag generated
        insecure coding rules as vulnerabilities.
    - path: "src/q_ai/rxp/**"
      instructions: >-
        RAG retrieval poisoning measurement. Focus on: embedding model
        registry correctness, ChromaDB integration, domain profile
        loading, and validation result accuracy. Check that optional
        dependencies (sentence-transformers, chromadb) are handled
        gracefully when not installed.
    - path: "src/q_ai/mcp/**"
      instructions: >-
        MCP connection utilities shared by audit, proxy, and chain.
        Verify: connection lifecycle management, transport enum handling,
        and proper async context manager patterns. Check error handling
        on connection failures.
    - path: "tests/**"
      instructions: >-
        Test suite. Verify: no real API calls (mock providers and MCP
        connections). Check cross-platform compatibility (no shell=True
        with Unix commands, use pathlib for paths). Ensure fixtures
        use obviously synthetic values for secrets (e.g.,
        AKIAEXAMPLEKEY1234567). Google-style docstrings required on
        test classes, optional on test methods.
    - path: ".github/workflows/**"
      instructions: >-
        CI/CD workflows. Check: secrets not exposed in logs, matrix
        includes both ubuntu-latest and windows-latest, and action
        versions are pinned to major tags (e.g. @v4, @v6).
        Do not flag tag-based pins or suggest SHA pinning.

  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: true

  pre_merge_checks:
    docstrings:
      mode: "off"

  tools:
    ruff:
      enabled: false  # pre-commit and CI handle this
    gitleaks:
      enabled: false  # pre-commit handles this
    trufflehog:
      enabled: false  # overlaps with gitleaks
    actionlint:
      enabled: true
    shellcheck:
      enabled: false
    yamllint:
      enabled: false
    markdownlint:
      enabled: false
    github-checks:
      enabled: false

chat:
  auto_reply: true

knowledge_base:
  code_guidelines:
    enabled: true
  learnings:
    scope: "local"
  issues:
    scope: "local"
  pull_requests:
    scope: "local"
  web_search:
    enabled: true

code_generation:
  docstrings:
    language: "en-US"
    path_instructions:
      - path: "**/*.py"
        instructions: >-
          Use Google-style docstrings. Include Args, Returns, and Raises
          sections. Keep descriptions concise — one line for simple
          functions, brief paragraph for complex ones.
  unit_tests:
    path_instructions:
      - path: "src/**/*.py"
        instructions: >-
          Use pytest with pytest-asyncio for async tests. Mock all
          external API calls and MCP connections. Use fixtures from
          conftest.py. Tests must pass on both Windows and Linux.
          Use pathlib for all file operations. Never use shell=True.
