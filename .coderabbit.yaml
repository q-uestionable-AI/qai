# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
early_access: true
tone_instructions: >-
  Concise, direct, security-aware. This is an offensive security platform —
  flag anything that could weaken scan accuracy, leak credentials, expose
  payloads unintentionally, or introduce false negatives. No fluff.

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_in_walkthrough: true
  poem: false
  in_progress_fortune: false
  sequence_diagrams: false
  collapse_walkthrough: true
  changed_files_summary: true
  review_status: true
  commit_status: true
  assess_linked_issues: true
  related_issues: true
  related_prs: false
  suggested_labels: false
  suggested_reviewers: false
  auto_apply_labels: false
  enable_prompt_for_ai_agents: true

  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
    ignore_title_keywords:
      - "WIP"
      - "DO NOT MERGE"

  path_filters:
    - "!**/__pycache__/**"
    - "!**/.mypy_cache/**"
    - "!**/.ruff_cache/**"
    - "!**/.pytest_cache/**"
    - "!**/uv.lock"

  path_instructions:
    - path: "src/q_ai/audit/scanner/**"
      instructions: >-
        Vulnerability scanning logic. Verify: scan coverage maps to OWASP
        MCP Top 10 categories. Check that evidence collection is deterministic
        and reproducible. Flag any scanner that silently swallows exceptions —
        false negatives are worse than false positives.
    - path: "src/q_ai/audit/**"
      instructions: >-
        MCP server scanner. Verify: no credential leakage in scan output,
        findings include category strings that map to frameworks.yaml,
        report formats are valid (HTML, SARIF, JSON).
    - path: "src/q_ai/proxy/**"
      instructions: >-
        MCP traffic interceptor. Security-critical — verify: no credential
        leakage in intercepted traffic logs, session isolation between
        concurrent sessions, replay doesn't modify original captured payloads.
    - path: "src/q_ai/inject/**"
      instructions: >-
        Tool poisoning and prompt injection. Verify: payload YAML templates
        include technique and OWASP mapping metadata. Campaign executor uses
        ProviderClient (never Anthropic SDK directly). Scoring operates on
        NormalizedResponse only.
    - path: "src/q_ai/chain/**"
      instructions: >-
        Attack chain executor. Verify: YAML chain definitions pass structural
        and semantic validation before execution. Cycle detection must run.
        Variable resolution must not allow path traversal via $step.artifact
        references.
    - path: "src/q_ai/ipi/**"
      instructions: >-
        IPI payload generation. Verify: output paths are constrained (no
        path traversal via base_name). Callback URLs are validated. No real
        credentials embedded in generated documents.
    - path: "src/q_ai/cxp/**"
      instructions: >-
        CXP context poisoning. Verify: repo output paths are constrained.
        Rule content from user-provided YAML is not executed — only inserted
        as text. No path traversal via repo_name.
    - path: "src/q_ai/rxp/**"
      instructions: >-
        RXP retrieval measurement. Optional heavy deps (chromadb,
        sentence-transformers). Verify: require_rxp_deps() is called before
        importing validator. Collection names are sanitized.
    - path: "src/q_ai/core/**"
      instructions: >-
        Core models, DB, config, LLM abstraction. Verify: credentials only
        via keyring (never plaintext config writes). ProviderClient protocol
        is respected — litellm imported only in llm_litellm.py. DB writes use
        parameterized queries. Cross-platform path handling via pathlib.
    - path: "src/q_ai/orchestrator/**"
      instructions: >-
        Workflow orchestration. Verify: WorkflowRunner is the only path for
        DB writes and WebSocket events from workflow functions. Background
        tasks have double-complete guards. wait_for_user/resume are idempotent.
    - path: "src/q_ai/server/**"
      instructions: >-
        FastAPI web UI. Verify: server binds to 127.0.0.1 only. No SSRF via
        infrastructure health check URLs (validate scheme and host). Settings
        API does not echo raw exception messages. Keyring RuntimeError returns
        4xx not 500.
    - path: "tests/**"
      instructions: >-
        Test suite. Verify: no real API calls (litellm, anthropic, etc. all
        mocked). Keyring mocked — no writes to OS keyring. No writes to
        ~/.qai/. Cross-platform compatibility. No real MCP server connections.
    - path: ".github/workflows/**"
      instructions: >-
        CI/CD. Check: secrets not exposed in logs, matrix includes
        ubuntu-latest and windows-latest, action versions pinned to major
        tags (e.g. @v6). Do not flag tag-based pins or suggest SHA pinning.

  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: true

  pre_merge_checks:
    docstrings:
      mode: "off"

  tools:
    ruff:
      enabled: false  # CI handles this
    gitleaks:
      enabled: false  # pre-commit handles this
    trufflehog:
      enabled: false  # overlaps with gitleaks
    actionlint:
      enabled: true
    shellcheck:
      enabled: false
    yamllint:
      enabled: false
    markdownlint:
      enabled: false
    github-checks:
      enabled: false

chat:
  auto_reply: true

knowledge_base:
  code_guidelines:
    enabled: true
  learnings:
    scope: "local"
  issues:
    scope: "local"
  pull_requests:
    scope: "local"
  web_search:
    enabled: true

code_generation:
  docstrings:
    language: "en-US"
    path_instructions:
      - path: "**/*.py"
        instructions: >-
          Use Google-style docstrings. Include Args, Returns, and Raises
          sections. Keep descriptions concise — one line for simple functions,
          brief paragraph for complex ones.
  unit_tests:
    path_instructions:
      - path: "src/**/*.py"
        instructions: >-
          Use pytest with pytest-asyncio for async tests. Mock all external
          calls (litellm, keyring, httpx, MCP connections). Use fixtures from
          conftest.py. Tests must pass on both Windows and Linux. No writes
          to ~/.qai/.
