name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy src/q_ai/

  test:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.13"

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Test
        run: uv run pytest -q

      - name: Smoke test CLI
        run: uv run qai --help

  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Bandit (SAST)
        run: uv run bandit -r src/ -c pyproject.toml

      - name: pip-audit (dependency vulnerabilities)
        # CVE-2026-4539: pygments ReDoS in AdlLexer — no fix available upstream (2.19.2 is latest)
        # aiohttp 3.13.3 CVEs - litellm 1.82.2+ hard-pins aiohttp==3.13.3
        # Fixed in aiohttp 3.13.4 but unpinnable until litellm releases fix
        # Remove these ignores when litellm unpins aiohttp
        run: >
          uv run pip-audit
          --ignore-vuln CVE-2026-4539
          --ignore-vuln CVE-2026-34515
          --ignore-vuln CVE-2026-34513
          --ignore-vuln CVE-2026-34516
          --ignore-vuln CVE-2026-34517
          --ignore-vuln CVE-2026-34519
          --ignore-vuln CVE-2026-34518
          --ignore-vuln CVE-2026-34520
          --ignore-vuln CVE-2026-34525
          --ignore-vuln CVE-2026-22815
          --ignore-vuln CVE-2026-34514
