<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}q-ai{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.23/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        theme: {
            extend: {
                fontFamily: {
                    sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif'],
                    mono: ['"Fira Code"', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
                },
            },
        },
    }
    </script>
    <script src="/static/htmx.min.js"></script>
    <link rel="stylesheet" href="/static/app.css">
</head>
<body class="bg-base-300 min-h-screen flex flex-col">
    <!-- Navigation -->
    <nav class="navbar bg-base-300 sticky top-0 z-50">
        <div class="flex-1">
            <a href="/" class="text-xl font-bold tracking-tight font-mono">
                <span style="color: #ffffff;">{</span><span style="color: #8b5cf6;">q</span><span style="color: #ffffff;">-AI}</span>
            </a>
        </div>
        <div class="flex-none">
            <ul class="menu menu-horizontal px-1 gap-1">
                <li>
                    <a href="/"
                       class="{% if active == 'launcher' %}active bg-primary/10 text-primary{% endif %}">
                        Launcher
                    </a>
                </li>
                <li>
                    <a href="/operations"
                       class="{% if active == 'operations' %}active bg-primary/10 text-primary{% endif %}">
                        Operations
                    </a>
                </li>
                <li>
                    <a href="/research"
                       class="{% if active == 'research' %}active bg-primary/10 text-primary{% endif %}">
                        Research
                    </a>
                </li>
                <li>
                    <a href="/settings" aria-label="Settings"
                       class="{% if active == 'settings' %}active bg-primary/10 text-primary{% endif %}">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/>
                        </svg>
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Page content -->
    <main class="flex-1">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
