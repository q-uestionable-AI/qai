<div class="flex gap-2 mb-3">
    <button class="btn btn-xs {% if not direction_filter %}btn-primary{% else %}btn-ghost{% endif %}"
            hx-get="/api/runs/proxy-messages/{{ run_id }}?page=1"
            hx-target="#proxy-messages-container" hx-swap="innerHTML">All</button>
    <button class="btn btn-xs {% if direction_filter == 'client_to_server' %}btn-primary{% else %}btn-ghost{% endif %}"
            hx-get="/api/runs/proxy-messages/{{ run_id }}?page=1&direction=client_to_server"
            hx-target="#proxy-messages-container" hx-swap="innerHTML">Client &rarr; Server</button>
    <button class="btn btn-xs {% if direction_filter == 'server_to_client' %}btn-primary{% else %}btn-ghost{% endif %}"
            hx-get="/api/runs/proxy-messages/{{ run_id }}?page=1&direction=server_to_client"
            hx-target="#proxy-messages-container" hx-swap="innerHTML">Server &rarr; Client</button>
    <span class="text-xs text-base-content/40 self-center ml-auto">{{ total }} messages</span>
</div>
{% if messages %}
<div class="overflow-y-auto max-h-[400px]">
    <table class="table table-xs w-full">
        <thead><tr><th>#</th><th>Dir</th><th>Method</th><th>Timestamp</th><th></th></tr></thead>
        <tbody>
            {% for m in messages %}
            <tr class="hover:bg-base-300/30">
                <td>{{ m.sequence }}</td>
                <td>{{ m.direction }}</td>
                <td class="font-mono text-xs">{{ m.method }}</td>
                <td class="text-xs text-base-content/40">{{ m.timestamp[:19] if m.timestamp else '\u2014' }}</td>
                <td><button class="btn btn-ghost btn-xs" onclick="this.closest('tr').nextElementSibling.classList.toggle('hidden')">Body</button></td>
            </tr>
            <tr class="hidden">
                <td colspan="5"><pre class="text-xs bg-base-300/30 p-2 rounded whitespace-pre-wrap break-all max-h-[200px] overflow-y-auto">{{ m.body }}</pre></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% if has_next %}
<div class="flex justify-center mt-3">
    <button class="btn btn-xs btn-ghost"
            hx-get="/api/runs/proxy-messages/{{ run_id }}?page={{ page + 1 }}{% if direction_filter %}&direction={{ direction_filter }}{% endif %}"
            hx-target="#proxy-messages-container" hx-swap="innerHTML">Load more</button>
</div>
{% endif %}
{% else %}
<p class="text-sm text-base-content/40">No messages captured.</p>
{% endif %}
