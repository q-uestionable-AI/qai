<div id="inject-panel" class="space-y-4">
    <form hx-post="/api/inject/campaign" hx-target="#inject-panel" hx-swap="outerHTML"
          class="bg-base-200 rounded-lg p-4 space-y-3">
        <div class="flex gap-4">
            <div class="form-control flex-1">
                <label class="label"><span class="label-text">Model</span></label>
                <input name="model" type="text" placeholder="claude-sonnet-4-6"
                       class="input input-bordered input-sm w-full" />
            </div>
            <div class="form-control flex-1">
                <label class="label"><span class="label-text">Technique</span></label>
                <select name="technique" class="select select-bordered select-sm w-full">
                    <option value="">All</option>
                    <option value="description_poisoning">Description Poisoning</option>
                    <option value="output_injection">Output Injection</option>
                    <option value="cross_tool_escalation">Cross-Tool Escalation</option>
                </select>
            </div>
            <div class="form-control w-24">
                <label class="label"><span class="label-text">Rounds</span></label>
                <input name="rounds" type="number" value="1" min="1"
                       class="input input-bordered input-sm w-full" />
            </div>
        </div>
        <div class="flex justify-end">
            <button type="submit" class="btn btn-primary btn-sm">Run Campaign</button>
        </div>
    </form>
    <div id="inject-results">
        {% if campaign_status %}
        <div class="text-sm text-base-content/60">Status: {{ campaign_status }}</div>
        {% endif %}
    </div>
</div>
