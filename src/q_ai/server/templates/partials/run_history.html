<div class="space-y-4">
    <div class="flex items-center justify-between">
        <h2 class="text-lg font-semibold">Run History</h2>
        <button class="btn btn-sm btn-outline btn-secondary"
                hx-get="/api/runs/history"
                hx-include="#filter-workflow, #filter-target, #filter-status, #filter-group-target"
                hx-target="#run-history-tbody"
                title="Refresh">
            &#x21bb; Refresh
        </button>
    </div>

    <!-- Filters -->
    <div class="flex gap-3 items-end flex-wrap">
        <div class="form-control w-48">
            <label class="label py-1"><span class="label-text text-xs">Workflow</span></label>
            <select id="filter-workflow" class="select select-bordered select-sm"
                    hx-get="/api/runs/history"
                    hx-include="#filter-workflow, #filter-target, #filter-status, #filter-group-target"
                    hx-target="#run-history-tbody"
                    hx-trigger="change"
                    hx-push-url="true"
                    name="workflow">
                <option value="">All workflows</option>
                {% for wf in workflows %}
                <option value="{{ wf.id }}" {% if current_workflow == wf.id %}selected{% endif %}>
                    {{ wf.name }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="form-control w-48">
            <label class="label py-1"><span class="label-text text-xs">Target</span></label>
            <select id="filter-target" class="select select-bordered select-sm"
                    hx-get="/api/runs/history"
                    hx-include="#filter-workflow, #filter-target, #filter-status, #filter-group-target"
                    hx-target="#run-history-tbody"
                    hx-trigger="change"
                    hx-push-url="true"
                    name="target_id">
                <option value="">All targets</option>
                {% for t in targets %}
                <option value="{{ t.id }}" {% if current_target == t.id %}selected{% endif %}>
                    {{ t.name }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="form-control w-48">
            <label class="label py-1"><span class="label-text text-xs">Status</span></label>
            <select id="filter-status" class="select select-bordered select-sm"
                    hx-get="/api/runs/history"
                    hx-include="#filter-workflow, #filter-target, #filter-status, #filter-group-target"
                    hx-target="#run-history-tbody"
                    hx-trigger="change"
                    hx-push-url="true"
                    name="status">
                <option value="">All statuses</option>
                {% for s in statuses %}
                <option value="{{ s }}" {% if current_status == s %}selected{% endif %}>
                    {{ s }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="form-control">
            <label class="label py-1 cursor-pointer gap-2">
                <span class="label-text text-xs">Group by target</span>
                <input type="checkbox" id="filter-group-target"
                       class="toggle toggle-xs"
                       name="group_by_target" value="1"
                       {% if group_by_target %}checked{% endif %}
                       hx-get="/api/runs/history"
                       hx-include="#filter-workflow, #filter-target, #filter-status, #filter-group-target"
                       hx-target="#run-history-tbody"
                       hx-trigger="change"
                       hx-push-url="true">
            </label>
        </div>
    </div>

    <!-- Bulk action bar (hidden until selection) -->
    <div id="bulk-action-bar" class="hidden flex items-center gap-3 p-2 bg-base-200 rounded-lg">
        <span id="bulk-selected-count" class="text-sm font-medium">0 runs selected</span>
        <div class="flex-1"></div>
        <button id="btn-bulk-compare" class="btn btn-sm btn-outline btn-info hidden"
                onclick="bulkCompare()">
            Compare
        </button>
        <button id="btn-bulk-export" class="btn btn-sm btn-outline btn-secondary"
                onclick="bulkExport()">
            Export Selected
        </button>
        <button id="btn-bulk-delete" class="btn btn-sm btn-outline btn-error"
                onclick="confirmBulkDelete()">
            Delete Selected
        </button>
    </div>

    <!-- Table -->
    <div class="overflow-x-auto">
        <table class="table table-sm">
            <thead>
                <tr>
                    <th class="w-8 text-center">
                        <input type="checkbox" id="select-all-runs"
                               class="checkbox checkbox-xs"
                               onchange="toggleSelectAll(this.checked)">
                    </th>
                    <th>Workflow</th>
                    <th>Target</th>
                    <th>Status</th>
                    <th>Findings</th>
                    <th>Duration</th>
                    <th>Started</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="run-history-tbody">
                {% include "partials/run_history_table.html" %}
            </tbody>
        </table>
    </div>
</div>

<!-- Delete confirmation modal (single run) -->
<dialog id="delete-run-modal" class="modal">
    <div class="modal-box">
        <h3 class="text-lg font-bold">Delete Run</h3>
        <p class="py-4" id="delete-run-message"></p>
        <div class="modal-action">
            <form method="dialog">
                <button class="btn btn-ghost">Cancel</button>
            </form>
            <button id="delete-run-confirm" class="btn btn-error">Delete</button>
        </div>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<!-- Bulk delete confirmation modal -->
<dialog id="bulk-delete-modal" class="modal">
    <div class="modal-box">
        <h3 class="text-lg font-bold">Delete Selected Runs</h3>
        <p class="py-4" id="bulk-delete-message"></p>
        <div class="modal-action">
            <form method="dialog">
                <button class="btn btn-ghost">Cancel</button>
            </form>
            <button id="bulk-delete-confirm" class="btn btn-error">Delete</button>
        </div>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<script>
// --- Selection state ---
var selectedRunIds = new Set();

function onRunSelectChange() {
    selectedRunIds = new Set();
    document.querySelectorAll('.run-select-cb').forEach(function(cb) {
        if (cb.checked) selectedRunIds.add(cb.dataset.runId);
    });
    updateBulkBar();
}

function toggleSelectAll(checked) {
    document.querySelectorAll('.run-select-cb').forEach(function(cb) {
        cb.checked = checked;
    });
    onRunSelectChange();
}

function updateBulkBar() {
    var bar = document.getElementById('bulk-action-bar');
    var countEl = document.getElementById('bulk-selected-count');
    var compareBtn = document.getElementById('btn-bulk-compare');
    var selectAllCb = document.getElementById('select-all-runs');
    var n = selectedRunIds.size;

    if (n > 0) {
        bar.classList.remove('hidden');
        countEl.textContent = n + ' run' + (n !== 1 ? 's' : '') + ' selected';
    } else {
        bar.classList.add('hidden');
    }

    // Compare only when exactly 2 selected
    if (n === 2) {
        compareBtn.classList.remove('hidden');
    } else {
        compareBtn.classList.add('hidden');
    }

    // Sync Select All checkbox
    var allCbs = document.querySelectorAll('.run-select-cb');
    if (selectAllCb && allCbs.length > 0) {
        selectAllCb.checked = (n === allCbs.length);
        selectAllCb.indeterminate = (n > 0 && n < allCbs.length);
    }
}

// Re-initialize selection state after HTMX swap (e.g. filter change)
document.addEventListener('htmx:afterSwap', function(evt) {
    if (evt.detail.target && evt.detail.target.id === 'run-history-tbody') {
        selectedRunIds = new Set();
        updateBulkBar();
        var selectAllCb = document.getElementById('select-all-runs');
        if (selectAllCb) selectAllCb.checked = false;
    }
});

// --- Single delete ---
function confirmDeleteRun(runId, displayName) {
    var modal = document.getElementById('delete-run-modal');
    document.getElementById('delete-run-message').textContent =
        'Delete run ' + runId.substring(0, 8) + ' (' + displayName + ')? ' +
        'This will permanently remove the run, all child runs, findings, and evidence. ' +
        'This cannot be undone.';
    var btn = document.getElementById('delete-run-confirm');
    btn.onclick = function() {
        fetch('/api/runs/' + runId, { method: 'DELETE' })
            .then(function(resp) {
                if (resp.ok) {
                    modal.close();
                    htmx.ajax('GET', buildHistoryUrl(), {target: '#run-history-tbody'});
                    return;
                }
                return resp.json()
                    .catch(function() { return { detail: 'Unexpected server response' }; })
                    .then(function(data) {
                        alert('Delete failed: ' + (data.detail || 'Unknown error'));
                    });
            })
            .catch(function() {
                alert('Delete failed: network error or server unreachable');
            });
    };
    modal.showModal();
}

// --- Filter-aware history refresh ---
function buildHistoryUrl() {
    var params = [];
    var wf = document.getElementById('filter-workflow');
    var tgt = document.getElementById('filter-target');
    var st = document.getElementById('filter-status');
    var grp = document.getElementById('filter-group-target');
    if (wf && wf.value) params.push('workflow=' + encodeURIComponent(wf.value));
    if (tgt && tgt.value) params.push('target_id=' + encodeURIComponent(tgt.value));
    if (st && st.value) params.push('status=' + encodeURIComponent(st.value));
    if (grp && grp.checked) params.push('group_by_target=1');
    return '/api/runs/history' + (params.length ? '?' + params.join('&') : '');
}

// --- Bulk delete ---
function confirmBulkDelete() {
    var ids = Array.from(selectedRunIds);
    if (ids.length === 0) return;
    var modal = document.getElementById('bulk-delete-modal');
    document.getElementById('bulk-delete-message').textContent =
        'Delete ' + ids.length + ' run' + (ids.length !== 1 ? 's' : '') + '? ' +
        'This will permanently remove all selected runs, their child runs, findings, and evidence. ' +
        'This cannot be undone.';
    var btn = document.getElementById('bulk-delete-confirm');
    btn.onclick = function() {
        fetch('/api/runs/bulk', {
            method: 'DELETE',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({run_ids: ids})
        })
        .then(function(resp) {
            if (!resp.ok) {
                return resp.json()
                    .catch(function() { return { detail: 'Unexpected server response' }; })
                    .then(function(data) {
                        alert('Bulk delete failed: ' + (data.detail || 'Unknown error'));
                    });
            }
            return resp.json().then(function(data) {
                var failedIds = data.failed || [];
                if (failedIds.length > 0) {
                    // Keep failed IDs selected, remove only successful ones
                    selectedRunIds = new Set(failedIds.filter(function(id) {
                        return selectedRunIds.has(id);
                    }));
                    alert('Deleted ' + data.deleted + ' run(s). ' +
                          failedIds.length + ' failed: ' + failedIds.join(', '));
                } else {
                    selectedRunIds = new Set();
                    modal.close();
                }
                updateBulkBar();
                htmx.ajax('GET', buildHistoryUrl(), {target: '#run-history-tbody'});
            });
        })
        .catch(function() {
            alert('Bulk delete failed: network error or server unreachable');
        });
    };
    modal.showModal();
}

// --- Bulk export ---
function bulkExport() {
    var ids = Array.from(selectedRunIds);
    if (ids.length === 0) return;
    fetch('/api/runs/bulk-export', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({run_ids: ids})
    })
    .then(function(resp) {
        if (!resp.ok) {
            return resp.json()
                .catch(function() { return { detail: 'Export failed' }; })
                .then(function(data) { alert(data.detail); });
        }
        return resp.blob().then(function(blob) {
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            var cd = resp.headers.get('content-disposition') || '';
            var match = cd.match(/filename="?([^"]+)"?/);
            a.download = match ? match[1] : 'runs-export.zip';
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
        });
    })
    .catch(function() {
        alert('Export failed: network error or server unreachable');
    });
}

// --- Compare ---
function bulkCompare() {
    var ids = Array.from(selectedRunIds);
    if (ids.length !== 2) return;
    window.location.href = '/runs/compare?left=' + ids[0] + '&right=' + ids[1];
}

// --- Target group toggle ---
function toggleTargetGroup(headerRow) {
    var chevron = headerRow.querySelector('.group-chevron');
    var next = headerRow.nextElementSibling;
    var collapsed = false;
    if (next && next.classList.contains('hidden')) {
        collapsed = true;
    }
    while (next && next.classList.contains('target-group-row')) {
        if (collapsed) {
            next.classList.remove('hidden');
        } else {
            next.classList.add('hidden');
        }
        next = next.nextElementSibling;
    }
    if (chevron) {
        chevron.style.transform = collapsed ? '' : 'rotate(-90deg)';
    }
}
</script>
