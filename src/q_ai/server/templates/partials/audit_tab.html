<div id="audit-panel" class="space-y-4">
    <form hx-post="/api/audit/scan" hx-target="#audit-panel" hx-swap="outerHTML"
          class="p-4 space-y-3">
        <div class="flex gap-4">
            <div class="form-control flex-1">
                <label class="label"><span class="label-text">Transport</span></label>
                <select name="transport" class="select select-bordered select-sm w-full">
                    <option value="stdio">stdio</option>
                    <option value="sse">SSE</option>
                    <option value="streamable-http">Streamable HTTP</option>
                </select>
            </div>
            <div class="form-control flex-[2]">
                <label class="label"><span class="label-text">Command / URL</span></label>
                <input name="target" type="text" placeholder="python my_server.py"
                       class="input input-bordered input-sm w-full" />
            </div>
        </div>
        <div class="flex justify-end">
            <button type="submit" class="btn btn-sm btn-outline btn-primary">Scan</button>
        </div>
    </form>
    <div id="audit-results">
        {% if scan_status %}
        <div class="text-sm text-base-content/60">Status: {{ scan_status }}</div>
        {% endif %}
    </div>
</div>
