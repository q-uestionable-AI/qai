{% for run in child_runs %}
<span class="badge badge-sm
    {% if run.status.value == 1 %}badge-info
    {% elif run.status.value == 2 %}badge-success
    {% elif run.status.value == 3 %}badge-error
    {% elif run.status.value == 4 %}badge-ghost
    {% elif run.status.value == 5 %}badge-warning
    {% elif run.status.value == 6 %}badge-warning
    {% else %}badge-ghost{% endif %}">
    {{ run.module }}: {{ run.status.name | format_status | lower }}
</span>
{% endfor %}
