<div class="panel p-6">
        <h2 class="text-lg font-semibold mb-4" style="color: #f1f5f9;">Target Providers</h2>

        <!-- Provider table -->
        <div class="overflow-x-auto" id="providers-table">
            <table class="table table-sm">
                <thead>
                    <tr>
                        <th>Provider</th>
                        <th>Status</th>
                        <th class="text-right">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in providers if p.configured %}
                    <tr>
                        <td class="text-sm">{{ p.label }}</td>
                        <td>
                            <span id="status-{{ p.name }}" class="badge badge-ghost badge-sm gap-1">
                                <span class="loading loading-spinner loading-xs"></span>
                                checking
                            </span>
                        </td>
                        <td class="text-right">
                            <div class="inline-flex gap-1">
                                <button class="btn btn-xs btn-outline btn-secondary btn-square" title="Edit"
                                        onclick="editProvider('{{ p.name }}')">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 20 20" fill="currentColor">
                                        <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"/>
                                    </svg>
                                </button>
                                <button class="btn btn-xs btn-outline btn-error btn-square" title="Delete"
                                        onclick="deleteProvider('{{ p.name }}')">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 20 20" fill="currentColor">
                                        <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"/>
                                    </svg>
                                </button>
                            </div>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="3" class="text-sm text-base-content/50 text-center py-4">
                            No providers configured yet. Use the form below to add one.
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <!-- Add Provider form -->
        <div class="divider text-sm text-base-content/40">Add / Edit Provider</div>
        <form id="add-provider-form" class="grid grid-cols-1 md:grid-cols-2 gap-4"
              onsubmit="return addProvider(event)">
            <div class="form-control">
                <label class="label"><span class="label-text">Provider</span></label>
                <select id="provider-select" class="select select-bordered select-sm"
                        onchange="toggleProviderFields()">
                    <option value="" disabled selected>Select provider</option>
                    {% for p in providers %}
                    <option value="{{ p.name }}">{{ p.label }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-control" id="api-key-field" style="display:none;">
                <label class="label"><span class="label-text">API Key</span></label>
                <input type="password" id="provider-api-key"
                       class="input input-bordered input-sm"
                       placeholder="sk-...">
            </div>

            <div class="form-control" id="base-url-field" style="display:none;">
                <label class="label"><span class="label-text">Base URL</span></label>
                <input type="text" id="provider-base-url"
                       class="input input-bordered input-sm"
                       placeholder="http://localhost:11434">
            </div>

            <div class="md:col-span-2 flex items-end gap-2">
                <button type="submit" class="btn btn-sm btn-outline btn-primary">Save</button>
                <span id="add-provider-msg" class="text-xs"></span>
            </div>
        </form>

        <!-- Defaults -->
        <div class="divider text-sm text-base-content/40">Defaults</div>
        <form id="defaults-form"
              class="grid grid-cols-1 md:grid-cols-2 gap-4"
              onsubmit="return saveDefaults(event)">

            <div class="form-control">
                <label class="label">
                    <span class="label-text">Default Audit Transport</span>
                </label>
                <select name="audit.default_transport"
                        class="select select-bordered select-sm">
                    <option value="stdio"
                        {% if defaults['audit.default_transport'] == 'stdio' %}selected{% endif %}>
                        stdio
                    </option>
                    <option value="sse"
                        {% if defaults['audit.default_transport'] == 'sse' %}selected{% endif %}>
                        sse
                    </option>
                    <option value="streamable-http"
                        {% if defaults['audit.default_transport'] == 'streamable-http' %}selected{% endif %}>
                        streamable-http
                    </option>
                </select>
            </div>

            <div class="form-control">
                <label class="label">
                    <span class="label-text">IPI Callback URL</span>
                </label>
                <input type="text" name="ipi.default_callback_url"
                       class="input input-bordered input-sm"
                       placeholder="https://example.com/callback"
                       value="{{ defaults['ipi.default_callback_url'] }}">
            </div>

            <div class="md:col-span-2 flex items-end gap-2">
                <button type="submit" class="btn btn-sm btn-outline btn-primary">Save</button>
                <span id="defaults-msg" class="text-xs"></span>
            </div>
        </form>
</div>

<script>
const CLOUD = new Set(["anthropic","google","openai","groq","openrouter","xai"]);
const LOCAL_DEFAULTS = {ollama:"http://localhost:11434", lmstudio:"http://localhost:1234"};

function toggleProviderFields() {
    const p = document.getElementById("provider-select").value;
    const keyF = document.getElementById("api-key-field");
    const urlF = document.getElementById("base-url-field");
    const keyI = document.getElementById("provider-api-key");
    const urlI = document.getElementById("provider-base-url");
    const showKey = CLOUD.has(p) || p === "custom";
    const showUrl = !CLOUD.has(p);
    keyF.style.display = showKey ? "" : "none";
    urlF.style.display = showUrl ? "" : "none";
    if (!showKey) keyI.value = "";
    if (!showUrl) urlI.value = "";
    if (LOCAL_DEFAULTS[p]) urlI.value = LOCAL_DEFAULTS[p];
}

function editProvider(name) {
    const sel = document.getElementById("provider-select");
    sel.value = name;
    toggleProviderFields();
    sel.closest("form").scrollIntoView({behavior: "smooth", block: "nearest"});
}

function addProvider(e) {
    e.preventDefault();
    const provider = document.getElementById("provider-select").value;
    const api_key = document.getElementById("provider-api-key").value;
    const base_url = document.getElementById("provider-base-url").value;
    const msg = document.getElementById("add-provider-msg");
    if (!provider) { msg.textContent = "Select a provider"; return false; }
    fetch("/api/settings/providers", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({provider, api_key, base_url})
    }).then(r => r.json()).then(d => {
        if (d.status === "ok") {
            msg.className = "text-xs text-success";
            msg.textContent = "Saved";
            htmx.ajax("GET", "/settings", {target: "#providers", select: "#providers"});
        } else {
            msg.className = "text-xs text-error";
            msg.textContent = d.detail || "Error";
        }
    }).catch(() => { msg.className = "text-xs text-error"; msg.textContent = "Request failed"; });
    return false;
}

function checkProviderStatus(name) {
    var badge = document.getElementById("status-" + name);
    if (!badge) return;
    fetch("/api/settings/providers/" + name + "/test")
        .then(function(r) { return r.json(); })
        .then(function(d) {
            if (d.status === "ok") {
                badge.className = "badge badge-success badge-sm gap-1";
                badge.textContent = "online";
            } else {
                badge.className = "badge badge-error badge-sm gap-1";
                badge.textContent = "offline";
            }
        }).catch(function() {
            badge.className = "badge badge-warning badge-sm gap-1";
            badge.textContent = "error";
        });
}

/* Fire connectivity checks for all configured providers on page load. */
{% for p in providers if p.configured %}
checkProviderStatus("{{ p.name }}");
{% endfor %}

function deleteProvider(name) {
    if (!confirm("Delete provider " + name + "?")) return;
    fetch("/api/settings/providers/" + name, {method: "DELETE"})
        .then(r => r.json()).then(() => {
            htmx.ajax("GET", "/settings", {target: "#providers", select: "#providers"});
        });
}

function saveDefaults(e) {
    e.preventDefault();
    var form = document.getElementById("defaults-form");
    var data = {};
    new FormData(form).forEach(function(v, k) { data[k] = v; });

    var msg = document.getElementById("defaults-msg");
    fetch("/api/settings/defaults", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    }).then(function(r) { return r.json(); }).then(function(d) {
        if (d.status === "saved") {
            msg.className = "text-xs text-success";
            msg.textContent = "Saved";
        } else {
            msg.className = "text-xs text-error";
            msg.textContent = d.detail || "Error";
        }
    }).catch(function() {
        msg.className = "text-xs text-error";
        msg.textContent = "Request failed";
    });
    return false;
}
</script>
