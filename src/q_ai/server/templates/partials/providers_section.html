<div class="panel p-6">
        <h2 class="text-lg font-semibold mb-4" style="color: #f1f5f9;">Target Providers</h2>

        <!-- Provider table -->
        <div class="overflow-x-auto" id="providers-table">
            <table class="table table-sm">
                <thead>
                    <tr>
                        <th>Provider</th>
                        <th>Status</th>
                        <th class="text-right">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in providers if p.configured %}
                    <tr id="row-{{ p.name }}">
                        <td class="text-sm">{{ p.label }}</td>
                        <td>
                            <span id="status-{{ p.name }}" class="badge badge-ghost badge-sm gap-1">
                                <span class="loading loading-spinner loading-xs"></span>
                                checking
                            </span>
                        </td>
                        <td class="text-right">
                            <div class="inline-flex gap-1">
                                <button class="btn btn-xs btn-outline btn-secondary btn-square" title="Edit"
                                        onclick="editProviderInline('{{ p.name }}')">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 20 20" fill="currentColor">
                                        <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"/>
                                    </svg>
                                </button>
                                <button class="btn btn-xs btn-outline btn-error btn-square" title="Delete"
                                        onclick="deleteProvider('{{ p.name }}')">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 20 20" fill="currentColor">
                                        <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"/>
                                    </svg>
                                </button>
                            </div>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="3" class="text-sm text-base-content/50 text-center py-4">
                            No providers configured yet. Use the form below to add one.
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <!-- Add Provider form -->
        <div class="divider text-sm text-base-content/40">Add Provider</div>
        <form id="add-provider-form" class="grid grid-cols-1 md:grid-cols-2 gap-4"
              onsubmit="return addProvider(event)">
            <div class="form-control">
                <label class="label"><span class="label-text">Provider</span></label>
                <select id="provider-select" class="select select-bordered select-sm"
                        onchange="toggleProviderFields()">
                    <option value="" disabled selected>Select provider</option>
                    {% for p in providers %}
                    <option value="{{ p.name }}">{{ p.label }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-control" id="api-key-field" style="display:none;">
                <label class="label"><span class="label-text">API Key</span></label>
                <input type="password" id="provider-api-key"
                       class="input input-bordered input-sm"
                       placeholder="sk-...">
            </div>

            <div class="form-control" id="base-url-field" style="display:none;">
                <label class="label"><span class="label-text">Base URL</span></label>
                <input type="text" id="provider-base-url"
                       class="input input-bordered input-sm"
                       placeholder="http://localhost:11434">
            </div>

            <div class="md:col-span-2 flex items-end gap-2">
                <button type="submit" class="btn btn-sm btn-outline btn-primary">Save</button>
                <span id="add-provider-msg" class="text-xs"></span>
            </div>
        </form>

        <!-- Defaults -->
        <div class="divider text-sm text-base-content/40">Defaults</div>
        <form id="defaults-form"
              class="grid grid-cols-1 md:grid-cols-2 gap-4"
              onsubmit="return saveDefaults(event)">

            <div class="form-control">
                <label class="label">
                    <span class="label-text">Default Audit Transport</span>
                </label>
                <select name="audit.default_transport"
                        class="select select-bordered select-sm">
                    <option value="stdio"
                        {% if defaults['audit.default_transport'] == 'stdio' %}selected{% endif %}>
                        stdio
                    </option>
                    <option value="sse"
                        {% if defaults['audit.default_transport'] == 'sse' %}selected{% endif %}>
                        sse
                    </option>
                    <option value="streamable-http"
                        {% if defaults['audit.default_transport'] == 'streamable-http' %}selected{% endif %}>
                        streamable-http
                    </option>
                </select>
            </div>

            <div class="form-control">
                <label class="label">
                    <span class="label-text">IPI Callback URL</span>
                </label>
                <input type="text" name="ipi.default_callback_url"
                       class="input input-bordered input-sm"
                       placeholder="https://example.com/callback"
                       value="{{ defaults['ipi.default_callback_url'] }}">
            </div>

            <div class="md:col-span-2 flex items-end gap-2">
                <button type="submit" class="btn btn-sm btn-outline btn-primary">Save</button>
                <span id="defaults-msg" class="text-xs"></span>
            </div>
        </form>
</div>

<script>
var CLOUD = new Set(["anthropic","google","openai","groq","openrouter","xai"]);
var LOCAL_DEFAULTS = {ollama:"http://localhost:11434", lmstudio:"http://localhost:1234"};
var PROVIDERS_INFO = {{ providers_status | tojson }};
var _providersInfoMap = {};
PROVIDERS_INFO.forEach(function(p) { _providersInfoMap[p.name] = p; });

/* ── Add-provider form field toggle ── */
function toggleProviderFields() {
    var p = document.getElementById("provider-select").value;
    var keyF = document.getElementById("api-key-field");
    var urlF = document.getElementById("base-url-field");
    var keyI = document.getElementById("provider-api-key");
    var urlI = document.getElementById("provider-base-url");
    var showKey = CLOUD.has(p) || p === "custom";
    var showUrl = !CLOUD.has(p);
    keyF.style.display = showKey ? "" : "none";
    urlF.style.display = showUrl ? "" : "none";
    if (!showKey) keyI.value = "";
    if (!showUrl) urlI.value = "";
    if (LOCAL_DEFAULTS[p]) urlI.value = LOCAL_DEFAULTS[p];
}

/* ── Add provider (bottom form) ── */
function addProvider(e) {
    e.preventDefault();
    var provider = document.getElementById("provider-select").value;
    var api_key = document.getElementById("provider-api-key").value;
    var base_url = document.getElementById("provider-base-url").value;
    var msg = document.getElementById("add-provider-msg");
    if (!provider) { msg.textContent = "Select a provider"; return false; }
    fetch("/api/admin/providers", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({provider: provider, api_key: api_key, base_url: base_url})
    }).then(function(r) { return r.json(); }).then(function(d) {
        if (d.status === "ok") {
            msg.className = "text-xs text-success";
            msg.textContent = "Saved";
            htmx.ajax("GET", "/admin", {target: "#providers", select: "#providers"});
        } else {
            msg.className = "text-xs text-error";
            msg.textContent = d.detail || "Error";
        }
    }).catch(function() { msg.className = "text-xs text-error"; msg.textContent = "Request failed"; });
    return false;
}

/* ── Inline edit ── */
function cancelInlineEdit() {
    var row = document.getElementById("inline-edit-row");
    if (row) row.remove();
}

function editProviderInline(name) {
    cancelInlineEdit();

    var info = _providersInfoMap[name] || {};
    var isCloud = CLOUD.has(name);
    var isCustom = name === "custom";
    var showKey = isCloud || isCustom;
    var showUrl = !isCloud;
    var savedUrl = info.base_url || "";

    var anchor = document.getElementById("row-" + name);
    if (!anchor) return;

    var tr = document.createElement("tr");
    tr.id = "inline-edit-row";

    var keyPlaceholder = info.has_key ? "Leave blank to keep current" : "sk-...";
    var urlValue = savedUrl || (LOCAL_DEFAULTS[name] || "");

    tr.innerHTML =
        '<td colspan="3" class="bg-base-200 p-0">' +
          '<div class="p-3 grid grid-cols-1 md:grid-cols-3 gap-3 items-end">' +
            '<div>' +
              '<span class="label-text text-xs" style="opacity:0.5;">Provider</span>' +
              '<div class="text-sm font-medium mt-1">' + (info.label || name) + '</div>' +
            '</div>' +
            '<div class="form-control" style="' + (showKey ? '' : 'display:none;') + '">' +
              '<label class="label py-0"><span class="label-text text-xs">API Key</span></label>' +
              '<input type="password" id="inline-edit-key"' +
              ' class="input input-bordered input-sm"' +
              ' placeholder="' + keyPlaceholder + '">' +
            '</div>' +
            '<div class="form-control" style="' + (showUrl ? '' : 'display:none;') + '">' +
              '<label class="label py-0"><span class="label-text text-xs">Base URL</span></label>' +
              '<input type="text" id="inline-edit-url"' +
              ' class="input input-bordered input-sm"' +
              ' value="' + urlValue.replace(/"/g, '&quot;') + '">' +
            '</div>' +
          '</div>' +
          '<div class="px-3 pb-3 flex items-center gap-2">' +
            '<button type="button" class="btn btn-xs btn-primary"' +
            ' onclick="saveInlineEdit(\'' + name + '\')">Save</button>' +
            '<button type="button" class="btn btn-xs btn-outline"' +
            ' onclick="cancelInlineEdit()">Cancel</button>' +
            '<span id="inline-edit-msg" class="text-xs"></span>' +
          '</div>' +
        '</td>';

    anchor.after(tr);
}

function saveInlineEdit(name) {
    var api_key = document.getElementById("inline-edit-key");
    var base_url = document.getElementById("inline-edit-url");
    var msg = document.getElementById("inline-edit-msg");

    var keyVal = api_key ? api_key.value.trim() : "";
    var urlVal = base_url ? base_url.value.trim() : "";

    fetch("/api/admin/providers", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({provider: name, api_key: keyVal, base_url: urlVal})
    }).then(function(r) { return r.json(); }).then(function(d) {
        if (d.status === "ok") {
            msg.className = "text-xs text-success";
            msg.textContent = "Saved";
            htmx.ajax("GET", "/admin", {target: "#providers", select: "#providers"});
        } else {
            msg.className = "text-xs text-error";
            msg.textContent = d.detail || "Error";
        }
    }).catch(function() {
        msg.className = "text-xs text-error";
        msg.textContent = "Request failed";
    });
}

/* ── Connectivity status checks ── */
function checkProviderStatus(name) {
    var badge = document.getElementById("status-" + name);
    if (!badge) return;
    fetch("/api/admin/providers/" + name + "/test")
        .then(function(r) { return r.json(); })
        .then(function(d) {
            if (d.status === "ok") {
                badge.className = "badge badge-success badge-sm gap-1";
                badge.textContent = "online";
            } else {
                badge.className = "badge badge-error badge-sm gap-1";
                badge.textContent = "offline";
            }
        }).catch(function() {
            badge.className = "badge badge-warning badge-sm gap-1";
            badge.textContent = "error";
        });
}

function checkAllProviderStatuses() {
    document.querySelectorAll("[id^='status-']").forEach(function(el) {
        checkProviderStatus(el.id.replace("status-", ""));
    });
}

checkAllProviderStatuses();

if (!window._providerSwapBound) {
    window._providerSwapBound = true;
    document.body.addEventListener("htmx:afterSettle", function(e) {
        if (e.detail.target && e.detail.target.id === "providers") {
            checkAllProviderStatuses();
        }
    });
}

/* ── Delete provider ── */
function deleteProvider(name) {
    if (!confirm("Delete provider " + name + "?")) return;
    fetch("/api/admin/providers/" + name, {method: "DELETE"})
        .then(function(r) { return r.json(); }).then(function() {
            htmx.ajax("GET", "/admin", {target: "#providers", select: "#providers"});
        });
}

/* ── Defaults form ── */
function saveDefaults(e) {
    e.preventDefault();
    var form = document.getElementById("defaults-form");
    var data = {};
    new FormData(form).forEach(function(v, k) { data[k] = v; });

    var msg = document.getElementById("defaults-msg");
    fetch("/api/admin/defaults", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    }).then(function(r) { return r.json(); }).then(function(d) {
        if (d.status === "saved") {
            msg.className = "text-xs text-success";
            msg.textContent = "Saved";
        } else {
            msg.className = "text-xs text-error";
            msg.textContent = d.detail || "Error";
        }
    }).catch(function() {
        msg.className = "text-xs text-error";
        msg.textContent = "Request failed";
    });
    return false;
}
</script>
