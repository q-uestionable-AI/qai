{% if findings %}
<table class="table table-xs">
    <thead>
        <tr><th>Severity</th><th>Category</th><th>Title</th></tr>
    </thead>
    <tbody>
        {% for f in findings %}
        <tr>
            <td><span class="badge badge-sm {% if f.severity.name == 'CRITICAL' %}badge-error{% elif f.severity.name == 'HIGH' %}badge-warning{% elif f.severity.name == 'MEDIUM' %}badge-info{% else %}badge-ghost{% endif %}">{{ f.severity.name }}</span></td>
            <td class="font-mono text-xs">{{ f.category }}</td>
            <td>{{ f.title }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<div class="text-sm text-base-content/40 py-4 text-center">No findings yet.</div>
{% endif %}
