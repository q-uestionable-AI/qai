<div class="panel p-6">
        <h2 class="text-lg font-semibold mb-4" style="color: #f1f5f9;">Infrastructure</h2>

        {% if infrastructure is defined and infrastructure %}
        <div class="overflow-x-auto">
            <table class="table table-sm">
                <thead>
                    <tr>
                        <th>Service</th>
                        <th>URL</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    {% for svc in infrastructure %}
                    <tr>
                        <td class="font-semibold text-sm">{{ svc.name }}</td>
                        <td class="font-mono text-xs text-base-content/60">{{ svc.url }}</td>
                        <td>
                            {% if svc.reachable %}
                            <span class="badge badge-success badge-sm">online</span>
                            {% else %}
                            <span class="badge badge-error badge-sm">offline</span>
                            {% endif %}
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        {% else %}
        <div id="infra-status"
             hx-get="/api/settings/infrastructure"
             hx-trigger="load"
             hx-swap="outerHTML">
            <span class="loading loading-spinner loading-sm"></span>
            <span class="text-sm text-base-content/50 ml-2">Checking endpoints...</span>
        </div>
        {% endif %}
</div>
