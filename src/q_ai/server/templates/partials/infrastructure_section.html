<div class="panel p-6">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-semibold" style="color: #f1f5f9;">Infrastructure</h2>
            <button type="button" class="btn btn-sm btn-outline btn-secondary"
                    hx-get="/api/settings/infrastructure"
                    hx-target="#infra-status"
                    hx-swap="innerHTML">
                &#x21bb; Refresh
            </button>
        </div>

        <div id="infra-status">
        {% if infrastructure is defined and infrastructure %}
        {% include "partials/infrastructure_content.html" %}
        {% else %}
        <div hx-get="/api/settings/infrastructure"
             hx-target="#infra-status"
             hx-trigger="load"
             hx-swap="innerHTML">
            <span class="loading loading-spinner loading-sm"></span>
            <span class="text-sm text-base-content/50 ml-2">Checking endpoints...</span>
        </div>
        {% endif %}
        </div>
</div>
