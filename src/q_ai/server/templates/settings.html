{% extends "base.html" %}
{% block title %}q-ai — Settings{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-6 py-8">
    <h1 class="text-2xl font-bold mb-6">Settings</h1>

    <!-- Assistant Section -->
    <section id="assistant" class="mb-8">
        {% include "partials/assist_section.html" %}
    </section>

    <!-- Target Providers Section -->
    <section id="providers" class="mb-8">
        {% set providers = providers_status %}
        {% include "partials/providers_section.html" %}
    </section>

    <!-- Defaults Section -->
    <section id="defaults" class="mb-8">
        {% include "partials/defaults_section.html" %}
    </section>
</div>
{% endblock %}
